[features]
resolution = true
skip-lint = false

[programs.localnet]
crank_lend = "GAWPC7CS46St5BxsuicijpzSG4GRWf6csaPvKRdZb314"
liquidator_vault = "ANSWdD2DCkAgfBATyVsGc25oiAapqBKBZUSUHcpNj2ZS"
mocks = "rec5EKMGg6MxZYaMdyBfgwp4d5rB9T1VQH5pJv5LtFJ"
