[programs.mainnet]
crank_lend = "GAWPC7CS46St5BxsuicijpzSG4GRWf6csaPvKRdZb314"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

# (remove RUST_LOG= to see bankRun logs)
[scripts]
test = "RUST_LOG= yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/*.spec.ts --exit --require tests/rootHooks.ts"

# All tests (for CI)
all-tests = "RUST_LOG= yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/*.spec.ts --exit --require tests/rootHooks.ts"

# Bankrun-only runner (no local validator)
# Use: anchor run kamino-tests
# Basic tests (01-13)
basic-tests = "RUST_LOG= yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/0*.spec.ts tests/1*.spec.ts --exit --require tests/rootHooks.ts"

# Emode tests (e01-e06)
emode-tests = "RUST_LOG= yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/e*.spec.ts --exit --require tests/rootHooks.ts"

# Pyth pull tests (p01)
pyth-tests = "RUST_LOG= yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/p*.spec.ts --exit --require tests/rootHooks.ts"

# Multi-limits tests (m01-m02)
limits-tests = "RUST_LOG= yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/m*.spec.ts --exit --require tests/rootHooks.ts"

# Bankruptcy tests (z*, zb*)
bankruptcy-tests = "RUST_LOG= yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/z*.spec.ts tests/zb*.spec.ts --exit --require tests/rootHooks.ts"

# Staked collateral tests only (s01-s10) - excludes solend (sl*) via pattern
staked-tests = "RUST_LOG= yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/s[0-9]*.spec.ts' --exit --require tests/rootHooks.ts"



